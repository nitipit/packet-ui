{% extends '_base.html' %}
{% set to_root = './' %}
{% block head %}
<link rel="stylesheet" href="./index.css?v={{_v}}">
{% endblock %}

{% block body %}
<div id="highlight" class="bg-p">
    <div class="container">
        <pkt-tag class="bg-p1" style="padding: 0 0.5rem;">
            <h1>Packet UI</h1>
        </pkt-tag>
        <p class="row" style="font-size: 1.5rem;">
            <strong class="color-c">HTML5</strong><br>
            <strong class="color-c">User Interface Framework</strong>
        </p>
        <div style="display: flex;">
            <a class="button bg-int-c" href="./guide/getting-started/quick-start.html">
                <pkt-icon set="adwaita" name="view-dual"></pkt-icon>
                <span style="margin-left: 0.2rem;">Guide</span>
            </a>
            <a class="button" el="github" href="https://github.com/nitipit/packet-ui">
                <pkt-icon set="brand" name="github"></pkt-icon>
                <span style="margin-left: 0.2rem;">Github</span>
            </a>
        </div>
    </div>
</div>

<div id="features" class="container">
    {{ markdown('index.html.features.md') }}
</div>

<div data-id="footer" style="margin-top: 10rem; height: 2rem;"></div>
{% endblock %}
